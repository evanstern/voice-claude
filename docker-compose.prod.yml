services:
  server:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    expose:
      - "4000"
    env_file:
      - .env
    environment:
      PORT: "4000"
      NODE_ENV: production
      WORK_DIR: /workspace
      PIPER_URL: http://piper:5000
      BEHIND_PROXY: "${BEHIND_PROXY:-true}"
      # GOOGLE_TTS_CREDENTIALS_FILE: /secrets/google-credentials.json
    volumes:
      - ${WORK_DIR:-./workspace}:/workspace
      - ${CONVERSATIONS_DIR:-./data/conversations}:/app/data/conversations
      # Mount Google TTS credentials if using Google TTS provider.
      # Uncomment above env var and below volume mount:
      # - ./google-credentials.json:/secrets/google-credentials.json:ro
    restart: unless-stopped
    labels:
      - traefik.enable=true
      # WebSocket endpoint — must match before the catch-all web route
      - traefik.http.routers.voice-claude-ws.rule=Host(`${VOICE_CLAUDE_HOST:-voice.local.infinity-node.win}`) && PathPrefix(`/ws`)
      - traefik.http.routers.voice-claude-ws.entrypoints=web
      - traefik.http.routers.voice-claude-ws.service=voice-claude-server
      # tRPC API — browser client hits /trpc directly when behind proxy
      - traefik.http.routers.voice-claude-api.rule=Host(`${VOICE_CLAUDE_HOST:-voice.local.infinity-node.win}`) && PathPrefix(`/trpc`)
      - traefik.http.routers.voice-claude-api.entrypoints=web
      - traefik.http.routers.voice-claude-api.service=voice-claude-server
      - traefik.http.routers.voice-claude-health.rule=Host(`${VOICE_CLAUDE_HOST:-voice.local.infinity-node.win}`) && Path(`/api/health`)
      - traefik.http.routers.voice-claude-health.entrypoints=web
      - traefik.http.routers.voice-claude-health.service=voice-claude-server
      - traefik.http.services.voice-claude-server.loadbalancer.server.port=4000
    networks:
      - voice-claude
      - traefik-network

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    expose:
      - "3000"
    env_file:
      - .env
    environment:
      PORT: "3000"
      NODE_ENV: production
      SERVER_URL: http://server:4000
    depends_on:
      - server
    restart: unless-stopped
    labels:
      - traefik.enable=true
      - traefik.http.routers.voice-claude-web.rule=Host(`${VOICE_CLAUDE_HOST:-voice.local.infinity-node.win}`)
      - traefik.http.routers.voice-claude-web.entrypoints=web
      - traefik.http.routers.voice-claude-web.service=voice-claude-web
      - traefik.http.routers.voice-claude-web.priority=1
      - traefik.http.services.voice-claude-web.loadbalancer.server.port=3000
    networks:
      - voice-claude
      - traefik-network

  # Piper local TTS — only started with: docker compose --profile piper up
  piper:
    build:
      context: ./docker/piper
    profiles:
      - piper
    env_file:
      - .env
    environment:
      PIPER_MODEL: /models/${PIPER_MODEL_NAME:-en_US-lessac-medium.onnx}
    volumes:
      - ${PIPER_MODELS_DIR:-./models/piper}:/models
    depends_on:
      piper-init:
        condition: service_completed_successfully
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 10s
      timeout: 3s
      start_period: 15s
      retries: 3
    networks:
      - voice-claude

  # Auto-downloads en_US-lessac-medium model only. Custom models must be placed manually.
  piper-init:
    image: alpine:3.20
    profiles:
      - piper
    volumes:
      - ${PIPER_MODELS_DIR:-./models/piper}:/models
    entrypoint: /bin/sh
    command:
      - -c
      - |
        MODEL_NAME="${PIPER_MODEL_NAME:-en_US-lessac-medium.onnx}"
        MODEL_PATH="/models/$${MODEL_NAME}"
        if [ -f "$${MODEL_PATH}" ]; then
          echo "[piper-init] Model already exists: $${MODEL_NAME}"
          exit 0
        fi
        echo "[piper-init] Downloading model: $${MODEL_NAME}..."
        apk add --no-cache wget
        wget -q -O "$${MODEL_PATH}" \
          "https://huggingface.co/rhasspy/piper-voices/resolve/v1.0.0/en/en_US/lessac/medium/$${MODEL_NAME}"
        wget -q -O "$${MODEL_PATH}.json" \
          "https://huggingface.co/rhasspy/piper-voices/resolve/v1.0.0/en/en_US/lessac/medium/$${MODEL_NAME}.json"
        echo "[piper-init] Download complete."
    environment:
      PIPER_MODEL_NAME: ${PIPER_MODEL_NAME:-en_US-lessac-medium.onnx}

networks:
  voice-claude:
    driver: bridge
  traefik-network:
    external: true
    name: ${TRAEFIK_NETWORK:-traefik-network}
