services:
  server:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    ports:
      - "${PORT:-4000}:4000"
    env_file:
      - .env
    environment:
      PORT: "4000"
      NODE_ENV: production
      WORK_DIR: /workspace
      PIPER_URL: http://piper:5000
      GOOGLE_TTS_CREDENTIALS_FILE: /secrets/google-credentials.json
    volumes:
      - ${WORK_DIR:-./workspace}:/workspace
      - ${CONVERSATIONS_DIR:-./data/conversations}:/app/data/conversations
      - ./google-credentials.json:/secrets/google-credentials.json:ro
    depends_on:
      piper:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - voice-claude

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - "${WEB_PORT:-3000}:3000"
    env_file:
      - .env
    environment:
      PORT: "3000"
      NODE_ENV: production
      SERVER_URL: http://server:4000
    depends_on:
      - server
    restart: unless-stopped
    networks:
      - voice-claude

  piper:
    build:
      context: ./docker/piper
    env_file:
      - .env
    environment:
      PIPER_MODEL: /models/${PIPER_MODEL_NAME:-en_US-lessac-medium.onnx}
    volumes:
      - ${PIPER_MODELS_DIR:-./models/piper}:/models
    restart: unless-stopped
    networks:
      - voice-claude

networks:
  voice-claude:
    driver: bridge
