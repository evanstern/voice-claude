services:
  server:
    build:
      context: .
      dockerfile: apps/server/Dockerfile.dev
    ports:
      - "${PORT:-4000}:4000"
    env_file:
      - .env
    environment:
      PORT: "4000"
      WORK_DIR: /workspace
      PIPER_URL: http://piper:5000
      GOOGLE_TTS_CREDENTIALS_FILE: /secrets/google-credentials.json
    volumes:
      - .:/app
      - ${WORK_DIR:-./workspace}:/workspace
      - ./google-credentials.json:/secrets/google-credentials.json:ro
      - /app/node_modules
      - /app/apps/server/node_modules
      - /app/apps/web/node_modules
      - /app/packages/contracts/node_modules
      - /app/packages/ui/node_modules
    depends_on:
      - piper

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile.dev
    ports:
      - "${WEB_PORT:-3000}:3000"
    env_file:
      - .env
    environment:
      SERVER_URL: http://server:4000
    volumes:
      - .:/app
      - /app/node_modules
      - /app/apps/server/node_modules
      - /app/apps/web/node_modules
      - /app/packages/contracts/node_modules
      - /app/packages/ui/node_modules
    depends_on:
      - server

  wake-word:
    build:
      context: ./services/wake-word
    ports:
      - "${WAKE_WORD_PORT:-9000}:9000"
    env_file:
      - .env
    environment:
      WAKE_WORD_PORT: "9000"
      WAKE_WORD_MODEL: "${WAKE_WORD_MODEL:-}"
    volumes:
      - ${WAKE_WORD_MODELS_DIR:-./models/wake-word}:/models

  piper:
    build:
      context: ./docker/piper
    env_file:
      - .env
    environment:
      PIPER_MODEL: /models/${PIPER_MODEL_NAME:-en_US-lessac-medium.onnx}
    volumes:
      - ${PIPER_MODELS_DIR:-./models/piper}:/models
